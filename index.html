<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Ma Boutique</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
}

header{
background:#111;
color:white;
padding:20px;
text-align:center;
font-size:30px;
}

.products{
display:flex;
justify-content:center;
flex-wrap:wrap;
margin-top:40px;
}

.product{
background:white;
padding:20px;
margin:20px;
width:200px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
text-align:center;
}

button{
padding:10px 15px;
background:#00c853;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.cart{
position:fixed;
right:20px;
top:100px;
background:white;
padding:20px;
width:200px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<header>
🛒 Ma Boutique
</header>

<div class="products">

<div class="product">
<h3>T-shirt</h3>
<p>20€</p>
<button onclick="add('T-shirt',20)">Ajouter</button>
</div>

<div class="product">
<h3>Casquette</h3>
<p>15€</p>
<button onclick="add('Casquette',15)">Ajouter</button>
</div>

<div class="product">
<h3>Hoodie</h3>
<p>40€</p>
<button onclick="add('Hoodie',40)">Ajouter</button>
</div>

</div>

<div class="cart">
<h3>Panier</h3>
<ul id="cart"></ul>
<p>Total : <span id="total">0</span>€</p>
</div>

<script>

let total = 0;

function add(name,price){

let li = document.createElement("li");
li.innerText = name + " - " + price + "€";

document.getElementById("cart").appendChild(li);

total += price;

document.getElementById("total").innerText = total;

}

</script>

</body>
</html>

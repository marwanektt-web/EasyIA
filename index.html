<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MK AI - ChatGPT Gratuit</title>

<!-- SEO -->
<meta name="description" content="Utilise une IA gratuite comme ChatGPT sans inscription. Rapide, simple et efficace.">

<style>

body{
margin:0;
font-family:system-ui;
background:#343541;
color:white;
display:flex;
height:100vh;
}

/* SIDEBAR */
.sidebar{
width:260px;
background:#202123;
padding:10px;
display:flex;
flex-direction:column;
}

.logo{
font-size:18px;
margin-bottom:10px;
}

.new-chat{
padding:10px;
border:1px solid #555;
cursor:pointer;
margin-bottom:10px;
}

.history{
flex:1;
overflow-y:auto;
font-size:13px;
}

/* CHAT */
.chat-container{
flex:1;
display:flex;
flex-direction:column;
}

.chat{
flex:1;
overflow-y:auto;
padding:20px;
}

.message{
padding:15px;
margin:10px 0;
border-radius:8px;
max-width:800px;
}

.user{
background:#444654;
margin-left:auto;
}

.bot{
background:#343541;
border-top:1px solid #555;
}

/* INPUT */
.input-box{
display:flex;
padding:15px;
background:#40414f;
}

input{
flex:1;
padding:15px;
border:none;
border-radius:5px;
font-size:16px;
}

button{
padding:15px;
margin-left:10px;
background:#19c37d;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

/* PUB */
.ad{
position:absolute;
bottom:10px;
left:10px;
font-size:12px;
opacity:0.7;
}

</style>
</head>

<body>

<div class="sidebar">
<div class="logo">🤖 MK AI</div>
<div class="new-chat" onclick="newChat()">+ Nouvelle conversation</div>
<div class="history" id="history"></div>

<div class="ad">
💰 Pub (AdSense ici)
</div>
</div>

<div class="chat-container">

<div class="chat" id="chat"></div>

<div class="input-box">
<input id="input" placeholder="Pose ta question..." onkeydown="if(event.key==='Enter') send()">
<button onclick="send()">➤</button>
</div>

</div>

<script>

let conversations = [];

function newChat(){
document.getElementById("chat").innerHTML = "";
}

async function send(){

let input = document.getElementById("input");
let text = input.value;

if(!text) return;

// user
document.getElementById("chat").innerHTML += 
`<div class="message user">${text}</div>`;

// loading
let id = "l"+Date.now();
document.getElementById("chat").innerHTML += 
`<div class="message bot" id="${id}">⏳ MK AI écrit...</div>`;

// scroll
document.getElementById("chat").scrollTop = 
document.getElementById("chat").scrollHeight;

// historique
conversations.push(text);
updateHistory();

// IA gratuite
let reply = "";

try{
let res = await fetch("https://api-inference.huggingface.co/models/facebook/blenderbot-400M-distill", {
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({inputs:text})
});

let data = await res.json();
reply = data[0]?.generated_text || "Réponse indisponible";
}catch{
reply = "⚠️ IA surchargée, réessaie.";
}

// afficher réponse
document.getElementById(id).outerHTML =
`<div class="message bot">${reply}</div>`;

input.value = "";

}

function updateHistory(){
let h = document.getElementById("history");
h.innerHTML = "";

conversations.slice(-10).forEach(c=>{
h.innerHTML += `<div>💬 ${c}</div>`;
});
}

</script>

</body>
</html>

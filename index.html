<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StudyAI</title>

<style>

/* GLOBAL */
body{
margin:0;
font-family:system-ui;
background:#343541;
color:white;
display:flex;
height:100vh;
}

/* SIDEBAR */
.sidebar{
width:260px;
background:#202123;
padding:10px;
display:flex;
flex-direction:column;
}

.logo{
font-size:16px;
margin-bottom:10px;
}

.new-chat{
border:1px solid #555;
padding:10px;
cursor:pointer;
margin-bottom:10px;
text-align:center;
border-radius:5px;
}

/* CHAT */
.chat-container{
flex:1;
display:flex;
flex-direction:column;
}

/* CHAT AREA */
.chat{
flex:1;
overflow-y:auto;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

/* WRAPPER */
.message-wrapper{
width:100%;
max-width:700px;
}

/* MESSAGES */
.message{
padding:18px;
margin:5px 0;
border-radius:6px;
line-height:1.6;
}

.user{
background:#444654;
}

.bot{
background:#343541;
border-top:1px solid #565869;
}

/* INPUT */
.input-box{
background:#40414f;
padding:15px;
display:flex;
justify-content:center;
}

.input-inner{
width:100%;
max-width:700px;
display:flex;
}

input{
flex:1;
padding:14px;
border:none;
border-radius:5px;
font-size:15px;
}

button{
margin-left:10px;
padding:14px;
background:#19c37d;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

/* LOADING */
.loading{
opacity:0.6;
font-style:italic;
}

</style>

</head>

<body>

<div class="sidebar">
<div class="logo">🤖 StudyAI</div>
<div class="new-chat" onclick="newChat()">+ Nouvelle conversation</div>
</div>

<div class="chat-container">

<div class="chat" id="chat"></div>

<div class="input-box">
<div class="input-inner">
<input id="input" placeholder="Envoyer un message..." onkeydown="if(event.key==='Enter') send()">
<button onclick="send()">➤</button>
</div>
</div>

</div>

<script>

/* nouvelle conversation */
function newChat(){
document.getElementById("chat").innerHTML = "";
}

/* effet typing */
function typeText(element, text){
let i = 0;
let interval = setInterval(()=>{
element.innerHTML += text.charAt(i);
i++;
if(i >= text.length) clearInterval(interval);
},15);
}

/* envoyer message */
async function send(){

let input = document.getElementById("input");
let text = input.value;

if(!text) return;

// USER
document.getElementById("chat").innerHTML += 
`<div class="message-wrapper">
<div class="message user">${text}</div>
</div>`;

// BOT (loading)
let id = "m"+Date.now();
document.getElementById("chat").innerHTML += 
`<div class="message-wrapper">
<div class="message bot loading" id="${id}">⏳ ...</div>
</div>`;

// scroll
document.getElementById("chat").scrollTop = 
document.getElementById("chat").scrollHeight;

// IA gratuite
let reply = "";

try{
let res = await fetch("https://api-inference.huggingface.co/models/facebook/blenderbot-400M-distill", {
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({inputs:text})
});

let data = await res.json();
reply = data[0]?.generated_text || "Réponse indisponible";
}catch{
reply = "⚠️ IA occupée, réessaie.";
}

// remplacer loading + typing
document.getElementById(id).innerHTML = "";
typeText(document.getElementById(id), reply);

input.value = "";

}

</script>

</body>
</html>
